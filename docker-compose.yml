services:
  sing-box:
    image: ghcr.io/sagernet/sing-box
    container_name: sing-box
    restart: unless-stopped
    network_mode: host

  singbox-srs-generator:
    build:
      context: .
      args:
        SING_BOX_IMAGE: ghcr.io/sagernet/sing-box
    container_name: singbox-srs-generator
    depends_on:
      - sing-box
    environment:
      GEOSITE_URL: "${GEOSITE_URL:-https://api.github.com/repos/MetaCubeX/meta-rules-dat/contents/geo/geosite?ref=sing}"
      GEOIP_URL: "${GEOIP_URL:-https://api.github.com/repos/MetaCubeX/meta-rules-dat/contents/geo/geoip?ref=sing}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    ports:
      - "9044:9044"
    volumes:
      - /vol1/1000/DockerData/sing-box/rules:/app/rules
      - /vol1/1000/DockerData/sing-box/rules-dat:/app/rules-dat
      - /vol1/1000/DockerData/sing-box/rule-set:/app/rule-set
      - ./config.json:/app/config.json
    restart: unless-stopped
